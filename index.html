<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aaron Shrestha</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d0d0d;
      --text: #f5f5f5;
      --muted: #666;
      --border: #222;
      --btn-bg: #1a1a1a;
      --btn-text: #888;
    }
    :root[data-theme="light"] {
      --bg: #fafafa;
      --text: #0d0d0d;
      --muted: #999;
      --border: #e5e5e5;
      --btn-bg: #f0f0f0;
      --btn-text: #666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, color 0.3s;
    }

    .theme-btn {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: 3px solid transparent;
      outline: 1px solid var(--border);
      outline-offset: -1px;
      padding: 0.4rem 0.9rem;
      font-family: 'Inter', sans-serif;
      font-size: 1.17rem;
      letter-spacing: 0.05em;
      border-radius: 99px;
      cursor: pointer;
      transition: color 0.25s, outline 0.25s;
    }
    .theme-btn:hover { color: var(--text); outline: 3px solid var(--text); }
    @media (max-width: 600px) { .theme-btn { font-size: 0.78rem; } }

    .center { text-align: center; }

    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1rem;
    }

    p {
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">light</button>
  <div style="position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;">site in progress</div>

  <div class="center">
    <h1>Aaron Shrestha</h1>
    <p>student. builder. always learning.</p>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('themeBtn');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        btn.textContent = 'dark';
      } else {
        html.setAttribute('data-theme', 'dark');
        btn.textContent = 'light';
      }
    }
  </script>
<!-- <h1>YOOOOOOOO</h1> -->
</body>
</html>
